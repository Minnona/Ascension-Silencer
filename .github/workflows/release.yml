name: Publish Addon Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - AscensionSilencer.toc

permissions:
  contents: write

concurrency:
  group: addon-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read addon version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk -F': ' '/^## Version:/ {gsub(/\r/, "", $2); print $2; exit}' AscensionSilencer.toc)"
          if [[ -z "$version" ]]; then
            echo "::error::Could not read ## Version from AscensionSilencer.toc"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build addon ZIP
        if: steps.existing.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release AscensionSilencer.zip
          mkdir -p release/AscensionSilencer

          find . -maxdepth 1 -type f \( -name '*.lua' -o -name '*.toc' \) \
            -exec cp {} release/AscensionSilencer/ \;
          cp -R Data Filters release/AscensionSilencer/

          cd release
          zip -qr ../AscensionSilencer.zip AscensionSilencer
          cd ..
          unzip -l AscensionSilencer.zip

      - name: Publish GitHub release
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "AscensionSilencer.zip#AscensionSilencer.zip" \
            --target "$GITHUB_SHA" \
            --title "Ascension Silencer v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest
